name: build & deploy demo

# builds JacobOS with the i686 cross toolchain, refreshes the bootable image in
# docs/, and publishes the docs/ folder to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# only one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-i686-linux-gnu binutils-i686-linux-gnu

      - name: Build kernel + image
        run: make

      - name: Stage the demo
        run: cp build/os-image.bin docs/jacobos.img

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
